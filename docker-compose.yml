services:
  app:
    build: .
    container_name: kuttit-app
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/kuttit
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
        - kuttit-network

  mongodb:
    image: mongo:latest
    container_name: kuttit-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
        - kuttit-network

  redis:
    image: redis:latest
    container_name: kuttit-redis
    ports:
      - "6379:6379"
    networks:
        - kuttit-network

networks:
  kuttit-network:
    driver: bridge

volumes:
  mongo-data: