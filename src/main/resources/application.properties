# App
spring.application.name=kuttit
server.port=8080
app.base-url=${APP_BASE_URL:http://localhost:8080}

# MongoDB (Docker-compatible + local fallback)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/kuttit}
spring.data.mongodb.auto-index-creation=true

# Redis (Docker-compatible + local fallback)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Expose health endpoint and show details
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# JWT secret key (should be overridden in production)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging level for Spring Security
logging.level.org.springframework.security=DEBUG

# QR code storage path
qr.storage.path=uploads/qr
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Swagger Springdoc configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.info.title=Kutt-it API
springdoc.info.description=URL Shortener REST API
springdoc.info.version=1.0.0